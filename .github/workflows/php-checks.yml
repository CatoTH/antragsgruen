name: PHP checks

on:
  pull_request:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  php: "
  {php: '8.2', experimental: false},
  {php: '8.3', experimental: false},
  {php: '8.4', experimental: false},
  {php: '8.5', experimental: false},
  "
  php-ext: curl, dom, fileinfo, iconv, intl, mbstring, mysql, pdo, zip

jobs:
  set-environment:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.out }}
      php-ext: ${{ steps.set-php-ext.outputs.out }}

    steps:
      - id: set-matrix
        run: echo "out={\"include\":[${{ env.php }}]}" >> $GITHUB_OUTPUT
      - id: set-php-ext
        run: echo "out=${{ env.php-ext }}" >> $GITHUB_OUTPUT

  check-composer:
    needs: [ set-environment ]
    name: Check Composer - PHP(${{ matrix.php }}) Experimental(${{ matrix.experimental }})
    strategy:
      matrix: ${{fromJson(needs.set-environment.outputs.matrix)}}
      fail-fast: false
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ needs.set-environment.outputs.php-ext }}
          cache: composer
      - name: Validate composer.json and composer.lock
        run: composer validate --no-cache --no-interaction
      - name: Check required php extensions
        if: "${{ matrix.experimental == false }}"
        run: composer check --no-cache
      - name: Install dependencies
        if: "${{ matrix.experimental == false }}"
        run: composer install --no-interaction --prefer-dist --no-progress --no-suggest
      - name: Install experimental dependencies, ignore php requirements
        if: "${{ matrix.experimental == true }}"
        run: composer install --no-interaction --prefer-dist --no-progress --no-suggest --ignore-platform-reqs

  unittest-codecept:
    needs: [ set-environment, check-composer ]
    name: Unittest by Codecept - PHP(${{ matrix.php }}) Experimental(${{ matrix.experimental }})
    strategy:
      matrix: ${{fromJson(needs.set-environment.outputs.matrix)}}
      fail-fast: false
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}

    # Docs: https://docs.github.com/en/actions/using-containerized-services
    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: false
          MYSQL_ROOT_PASSWORD: yii
          MYSQL_PASSWORD: yii
          MYSQL_USER: yii
          MYSQL_DATABASE: yii
        ports:
          - 3306/tcp
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v6
      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ needs.set-environment.outputs.php-ext }}
          cache: composer
      - name: Install dependencies
        if: "${{ matrix.experimental == false }}"
        run: composer install --no-interaction --prefer-dist --no-progress --no-suggest
      - name: Install experimental dependencies, ignore php requirements
        if: "${{ matrix.experimental == true }}"
        run: composer install --no-interaction --prefer-dist --no-progress --no-suggest --ignore-platform-reqs

      - name: Copy test config.
        run: cp config/config_tests.template.json config/config_tests.json

      - name: Validate config of codecept.
        run: |
          php -d register_argc_argv=On vendor/bin/codecept --version
          php -d register_argc_argv=On vendor/bin/codecept config:validate

      - name: Run unittest.
        run: |
          php -d register_argc_argv=On vendor/bin/codecept clean
          php -d register_argc_argv=On vendor/bin/codecept build
          php -d register_argc_argv=On vendor/bin/codecept run Unit

  acceptance-codecept:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Start Docker Compose stack
        run: |
          echo "DB_USER=root" > .env
          echo "DB_PASSWORD=root" >> .env
          echo "RANDOM_SEED=12345" >> .env
          echo "RABBITMQ_DEFAULT_USER=guest" >> .env
          echo "RABBITMQ_DEFAULT_PASS=guest" >> .env
          for i in {1..3}; do docker compose --profile acceptance -f docker-compose.development.yml pull && break || sleep 15; done
          docker compose --profile acceptance -f docker-compose.development.yml up -d
      - name: Initialize DB and test data
        run: |
          touch config/DEBUG
          docker compose -f docker-compose.development.yml exec -T web sh -c 'until mysql -h mysql -u root -proot -e "select 1" > /dev/null 2>&1; do sleep 2; done'
          docker compose -f docker-compose.development.yml exec -T web sh docker/initialize-development-environment.sh
          cp config/config_tests.template.json config/config_tests.json
          sed -i 's/127.0.0.1/mysql/' config/config_tests.json
          sed -i 's/32768/3306/' config/config_tests.json
          sed -i 's/dbname=yii/dbname=antragsgruen/' config/config_tests.json
          sed -i 's/"username": "yii"/"username": "root"/' config/config_tests.json
          sed -i 's/"password": "yii"/"password": "root"/' config/config_tests.json
          sed -i 's/localhost:8080/test.antragsgruen.test/' config/config_tests.json
          sed -i 's/host: 127.0.0.1/host: selenium/' tests/Acceptance.suite.yml
          docker compose -f docker-compose.development.yml exec -T web php -d register_argc_argv=On vendor/bin/codecept build
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true
      - name: Build frontend assets
        run: |
          pnpm install
          pnpm run build
      - name: Run Acceptance Tests
        run: docker compose -f docker-compose.development.yml exec -T web php -d register_argc_argv=On vendor/bin/codecept run Acceptance
      - name: Upload acceptance test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-output
          path: tests/_output/

