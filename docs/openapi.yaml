openapi: 3.0.0
info:
  title: Antragsgrün API
  description: REST API for [Antragsgrün](https://antragsgruen.de/)
  version: 0.4.0
paths:
  /rest:
    get:
      operationId: getConsultations
      summary: List of consultations in this site
      tags:
        - Consultations
      responses:
        '200':
          description: Consultation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultationLinkList'
        '403':
          $ref: '#/components/responses/ApiDisabled'

  /rest/user:
    get:
      operationId: getUser
      summary: Gets user information
      tags:
        - User
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: User information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /rest/user/login:
    post:
      operationId: loginUser
      summary: Log in with username and password to retrieve a JWT
      description: >
        Only succeeds if the account could also log in without any further interactive step on the website: the
        e-mail address must already be confirmed, no forced password change must be pending, no captcha must
        currently be required (e.g. after repeated failed login attempts), and the account must not have
        two-factor authentication set up or enforced. Accounts hitting any of these cases have to log in through
        the regular web UI instead.
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
      responses:
        '200':
          description: >
            Login successful. Returns a JWT to be used as a bearer token for subsequent requests.
            The token is only valid on the site it was issued on, and is invalidated by a password change.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLoginResponse'
        '401':
          description: Invalid username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: >
            Login is not possible via the API: the REST API is not enabled for this site, the site's
            login method does not allow username/password login, the e-mail address is not confirmed yet, a
            password change is required, a captcha is required, or two-factor authentication is set up/enforced
            for this account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'

  /rest/{consultationPath}:
    get:
      operationId: getConsultation
      summary: Overview over this consultation, with links to motions and amendments.
      tags:
        - Consultations
      parameters:
        - $ref: '#/components/parameters/consultationPath'
      responses:
        '200':
          description: Consultation info, motion and amendment links
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultationWithLinks'
        '403':
          $ref: '#/components/responses/ApiDisabled'
        '404':
          $ref: '#/components/responses/NotFound'

  /rest/{consultationPath}/motion-types:
    get:
      operationId: getMotionTypes
      summary: List of motion types defined for this consultation
      tags:
        - Motion Types
      parameters:
        - $ref: '#/components/parameters/consultationPath'
      responses:
        '200':
          description: Motion type list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionTypeList'
        '403':
          $ref: '#/components/responses/ApiDisabled'
        '404':
          $ref: '#/components/responses/NotFound'

  /rest/{consultationPath}/motion-types/{motionTypeId}:
    patch:
      operationId: updateMotionType
      summary: Updates the settings of an existing motion type
      description: >
        Partial update: only the top-level groups present in the request body are changed (e.g. omitting "policies"
        leaves the existing policies untouched). A group that is present must be provided in full, replacing
        whatever was previously configured for that group. Does not create, delete, or reorder motion types, and
        does not touch section definitions - only existing settings of an existing motion type are updated.
      tags:
        - Motion Types
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionTypeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MotionTypeUpdateRequest'
      responses:
        '200':
          description: Motion type was updated successfully. Returns the full, updated motion type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionType'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: No permission to change consultation settings, or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error (e.g. unknown pdf_layout_id, invalid deadline dates, amendment_initiator_settings missing "settings" while same_as_motion is false)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidation'

  /rest/{consultationPath}/proposed-procedure:
    get:
      operationId: getProposedProcedure
      summary: Gets the public proposed procedure of this consultation
      tags:
        - Consultations
      parameters:
        - $ref: '#/components/parameters/consultationPath'
      responses:
        '200':
          description: The proposed procedure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposedProcedure'
        '403':
          $ref: '#/components/responses/ApiDisabled'
        '404':
          $ref: '#/components/responses/NotFound'

  /rest/{consultationPath}/motion:
    post:
      operationId: createMotion
      summary: Create a new motion in this consultation
      tags:
        - Motions
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MotionCreateRequest'
      responses:
        '201':
          description: Motion was created successfully. Returns the full motion details, including the URL under which it can be retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: No permission to create motions, or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error (e.g. required section missing, text too long)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidation'

  /rest/{consultationPath}/motion/{motionSlug}:
    get:
      operationId: getMotion
      summary: Details of this motion
      description: The URL of this endpoint is not 100% predictable (because of motionSlug) - please only use the links provided by the consultation index
      tags:
        - Motions
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionSlug'
        - $ref: '#/components/parameters/lineNumbers'
      responses:
        '200':
          description: Motion info, including links to amendments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionDetails'
        '403':
          $ref: '#/components/responses/ApiDisabled'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateMotion
      summary: Updates this motion
      tags:
        - Motions
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MotionUpdateRequest'
      responses:
        '200':
          description: Motion was updated successfully. Returns the full motion details, including the URL under which it can be retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: No permission to create motions, or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error (e.g. required section missing, text too long)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidation'

  /rest/{consultationPath}/motion/{motionSlug}/screen:
    post:
      operationId: screenMotion
      summary: Screens (publishes) this motion, assigning it its final prefix and version
      description: >
        Only possible while the motion is in the screening process (submitted, unscreened) and the current
        user holds the screening privilege for this motion type.
      tags:
        - Motions
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MotionScreenRequest'
      responses:
        '200':
          description: Motion was screened successfully. Returns the full motion details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Screening this motion is not possible (missing privilege, or the motion is not in the screening process), or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error (e.g. the given prefix/version is already used by another motion)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidation'

  /rest/{consultationPath}/motion/{motionSlug}/amendment:
    post:
      operationId: createAmendment
      summary: Create a new amendment to this motion
      tags:
        - Amendments
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmendmentCreateRequest'
      responses:
        '201':
          description: Amendment was created successfully. Returns the full amendment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmendmentDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: No permission to create amendments, or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error (e.g. required section missing, text too long)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidation'

  /rest/{consultationPath}/motion/{motionSlug}/amendment/{amendmentId}:
    get:
      operationId: getAmendment
      summary: Details of this amendment
      description: The URL of this endpoint is not 100% predictable (because of motionSlug) - please only use the links provided by the consultation index
      tags:
        - Amendments
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionSlug'
        - $ref: '#/components/parameters/amendmentId'
      responses:
        '200':
          description: Amendment info, including links to amendments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmendmentDetails'
        '403':
          $ref: '#/components/responses/ApiDisabled'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateAmendment
      summary: Updates this amendment
      tags:
        - Amendments
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionSlug'
        - $ref: '#/components/parameters/amendmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmendmentUpdateRequest'
      responses:
        '200':
          description: Amendment was updated successfully. Returns the full amendment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmendmentDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: No permission to edit this amendment, or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error (e.g. required section missing, text too long)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidation'

  /rest/{consultationPath}/motion/{motionSlug}/support:
    post:
      operationId: supportMotion
      summary: Support this motion (or the pending secondary motion it represents) as the current user
      description: >
        Idempotent: if the current user already supports this motion, no additional support entry is created
        and the current motion state is returned unchanged.
      tags:
        - Motions
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportRequest'
      responses:
        '200':
          description: Support was registered (or already existed). Returns the full motion details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Supporting this motion is not possible (policy, deadline or status), or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error (e.g. name missing, organization required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidation'
    delete:
      operationId: revokeMotionSupport
      summary: Revoke the current user's support/like/dislike of this motion
      description: "Idempotent: if the current user does not support this motion, this is a no-op."
      tags:
        - Motions
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionSlug'
      responses:
        '200':
          description: Support was revoked (or did not exist). Returns the full motion details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Revoking support is not possible given the current motion status, or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'

  /rest/{consultationPath}/motion/{motionSlug}/amendment/{amendmentId}/support:
    post:
      operationId: supportAmendment
      summary: Support this amendment as the current user
      description: >
        Idempotent: if the current user already supports this amendment, no additional support entry is created
        and the current amendment state is returned unchanged.
      tags:
        - Amendments
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionSlug'
        - $ref: '#/components/parameters/amendmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportRequest'
      responses:
        '200':
          description: Support was registered (or already existed). Returns the full amendment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmendmentDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Supporting this amendment is not possible (policy, deadline or status), or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error (e.g. name missing, organization required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidation'
    delete:
      operationId: revokeAmendmentSupport
      summary: Revoke the current user's support/like/dislike of this amendment
      description: "Idempotent: if the current user does not support this amendment, this is a no-op."
      tags:
        - Amendments
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionSlug'
        - $ref: '#/components/parameters/amendmentId'
      responses:
        '200':
          description: Support was revoked (or did not exist). Returns the full amendment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmendmentDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Revoking support is not possible given the current amendment status, or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'

  /rest/{consultationPath}/motion/{motionSlug}/amendment/{amendmentId}/screen:
    post:
      operationId: screenAmendment
      summary: Screens (publishes) this amendment, assigning it its final prefix
      description: >
        Only possible while the amendment is in the screening process (submitted, unscreened) and the current
        user holds the screening privilege for this motion type.
      tags:
        - Amendments
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionSlug'
        - $ref: '#/components/parameters/amendmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmendmentScreenRequest'
      responses:
        '200':
          description: Amendment was screened successfully. Returns the full amendment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmendmentDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Screening this amendment is not possible (missing privilege, or the amendment is not in the screening process), or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error (e.g. the given prefix is already used by another amendment)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidation'

  /rest/{consultationPath}/agenda:
    get:
      operationId: getAgenda
      summary: Gets the agenda of this consultation
      tags:
        - Agenda
      parameters:
        - $ref: '#/components/parameters/consultationPath'
      responses:
        '200':
          description: The agenda
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgendaList'
        '403':
          $ref: '#/components/responses/ApiDisabled'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: saveAgenda
      summary: Save the new agenda
      tags:
        - Agenda
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendaList'
      responses:
        '200':
          description: The agenda
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgendaList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: No permission to edit the agenda, or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'

  /rest/{consultationPath}/debate:
    get:
      operationId: getCurrentDebate
      summary: The current state of the "Currently debated" section
      description: >
        Returns the motion, amendment, or agenda item that is currently being debated.
        This endpoint is available without authentication as long as the "Currently debated"
        feature is enabled for the consultation, independently of whether general API access
        is enabled for the site.
      tags:
        - Debate
      parameters:
        - $ref: '#/components/parameters/consultationPath'
      responses:
        '200':
          description: The current debate state. `current` is null if nothing is being debated right now.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebateState'
        '404':
          description: The consultation was not found, or the "Currently debated" feature is not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Send a JWT in the `Authorization: Bearer <token>` header."

  parameters:
    consultationPath:
      in: path
      name: consultationPath
      description: The URL-path-segment identifying the consultation
      required: true
      example: std-parteitag
      schema:
        type: string
    motionSlug:
      in: path
      name: motionSlug
      description: The URL-path-segment identifying the motion. Not guaranteed to be stable - only use the values provided by the consultation index links.
      required: true
      example: 123-motion
      schema:
        type: string
    amendmentId:
      in: path
      name: amendmentId
      description: The numeric ID of the amendment
      required: true
      example: 42
      schema:
        type: string
    motionTypeId:
      in: path
      name: motionTypeId
      description: The numeric ID of the motion type
      required: true
      example: 3
      schema:
        type: string
    lineNumbers:
      in: query
      name: lineNumbers
      required: false
      description: If true, then line number markers will be returned in the text (if there are any)
      example: true
      schema:
        type: boolean

  responses:
    ApiDisabled:
      description: The REST API is not enabled for this consultation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiDisabled'
    NotFound:
      description: The consultation (or the requested resource within it) was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorNotFound'
    Unauthorized:
      description: Missing, invalid, or expired bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorUnauthorized'

  schemas:
    AgendaList:
      x-php-namespace: agenda
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AgendaItem'

    AgendaItem:
      x-php-namespace: agenda
      type: object
      required:
        - type
        - title
        - settings
        - children
      properties:
        id:
          type: integer
          description: Always set when retrieving the agenda; only optional when saving, for newly created items.
          example: 12
        type:
          type: string
          enum:
            - item
            - date_separator
        code:
          type: string
          description: If not set or null (default), the agenda item code will be automatically determined.
          example: "7."
        title:
          type: string
          example: "Discussion about motions"
        time:
          type: string
          example: "12:34"
          description: Time in 24h format
        date:
          type: string
          example: "2020-12-31"
          description: Only relevant for type=date_separator. Format is YYYY-MM-DD
        settings:
          $ref: '#/components/schemas/AgendaItemSettings'
        children:
          type: array
          items:
            $ref: '#/components/schemas/AgendaItem'

    AgendaItemSettings:
      x-php-namespace: agenda
      type: object
      required:
        - has_speaking_list
        - in_proposed_procedures
        - motion_types
      properties:
        has_speaking_list:
          type: boolean
        speaking_lists:
          type: array
          nullable: true
          items:
            type: integer
          desription: Only set when this object is returned from the API; ignored when using the object for saving the agenda.
        in_proposed_procedures:
          type: boolean
        motion_types:
          type: array
          items:
            type: integer
          description: List of Motion Type IDs permissible for this agenda item. At the moment, only one is supported, subject to future enhancements.
          example:
            - 12

    ConsultationLinkList:
      x-php-namespace: consultation
      type: object
      required:
        - consultations
      properties:
        consultations:
          type: array
          items:
            $ref: '#/components/schemas/ConsultationLink'

    ConsultationLink:
      x-php-namespace: consultation
      type: object
      properties:
        title:
