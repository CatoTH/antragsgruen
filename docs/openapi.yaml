openapi: 3.0.0
info:
  title: Antragsgrün API
  description: REST API for [Antragsgrün](https://antragsgruen.de/)
  version: 0.4.0
paths:
  /rest:
    get:
      operationId: getConsultations
      summary: List of consultations in this site
      tags:
        - Consultations
      responses:
        '200':
          description: Consultation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultationLinkList'
        '403':
          $ref: '#/components/responses/ApiDisabled'

  /rest/user:
    get:
      operationId: getUser
      summary: Gets user information
      tags:
        - User
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: User information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /rest/{consultationPath}:
    get:
      operationId: getConsultation
      summary: Overview over this consultation, with links to motions and amendments.
      tags:
        - Consultations
      parameters:
        - $ref: '#/components/parameters/consultationPath'
      responses:
        '200':
          description: Consultation info, motion and amendment links
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultationWithLinks'
        '403':
          $ref: '#/components/responses/ApiDisabled'
        '404':
          $ref: '#/components/responses/NotFound'

  /rest/{consultationPath}/motion-types:
    get:
      operationId: getMotionTypes
      summary: List of motion types defined for this consultation
      tags:
        - Motion Types
      parameters:
        - $ref: '#/components/parameters/consultationPath'
      responses:
        '200':
          description: Motion type list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionTypeList'
        '403':
          $ref: '#/components/responses/ApiDisabled'
        '404':
          $ref: '#/components/responses/NotFound'

  /rest/{consultationPath}/proposed-procedure:
    get:
      operationId: getProposedProcedure
      summary: Gets the public proposed procedure of this consultation
      tags:
        - Consultations
      parameters:
        - $ref: '#/components/parameters/consultationPath'
      responses:
        '200':
          description: The proposed procedure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposedProcedure'
        '403':
          $ref: '#/components/responses/ApiDisabled'
        '404':
          $ref: '#/components/responses/NotFound'

  /rest/{consultationPath}/motion:
    post:
      operationId: createMotion
      summary: Create a new motion in this consultation
      tags:
        - Motions
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MotionCreateRequest'
      responses:
        '201':
          description: Motion was created successfully. Returns the full motion details, including the URL under which it can be retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: No permission to create motions, or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error (e.g. required section missing, text too long)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidation'

  /rest/{consultationPath}/motion/{motionSlug}:
    get:
      operationId: getMotion
      summary: Details of this motion
      description: The URL of this endpoint is not 100% predictable (because of motionSlug) - please only use the links provided by the consultation index
      tags:
        - Motions
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionSlug'
        - $ref: '#/components/parameters/lineNumbers'
      responses:
        '200':
          description: Motion info, including links to amendments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionDetails'
        '403':
          $ref: '#/components/responses/ApiDisabled'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateMotion
      summary: Updates this motion
      tags:
        - Motions
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MotionUpdateRequest'
      responses:
        '200':
          description: Motion was updated successfully. Returns the full motion details, including the URL under which it can be retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: No permission to create motions, or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error (e.g. required section missing, text too long)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidation'

  /rest/{consultationPath}/motion/{motionSlug}/amendment/{amendmentId}:
    get:
      operationId: getAmendment
      summary: Details of this amendment
      description: The URL of this endpoint is not 100% predictable (because of motionSlug) - please only use the links provided by the consultation index
      tags:
        - Amendments
      parameters:
        - $ref: '#/components/parameters/consultationPath'
        - $ref: '#/components/parameters/motionSlug'
        - $ref: '#/components/parameters/amendmentId'
      responses:
        '200':
          description: Amendment info, including links to amendments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmendmentDetails'
        '403':
          $ref: '#/components/responses/ApiDisabled'
        '404':
          $ref: '#/components/responses/NotFound'

  /rest/{consultationPath}/agenda:
    get:
      operationId: getAgenda
      summary: Gets the agenda of this consultation
      tags:
        - Agenda
      parameters:
        - $ref: '#/components/parameters/consultationPath'
      responses:
        '200':
          description: The agenda
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgendaList'
        '403':
          $ref: '#/components/responses/ApiDisabled'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: saveAgenda
      summary: Save the new agenda
      tags:
        - Agenda
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/consultationPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendaList'
      responses:
        '200':
          description: The agenda
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgendaList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: No permission to edit the agenda, or the REST API is not enabled for this consultation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNoPermission'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Send a JWT in the `Authorization: Bearer <token>` header."

  parameters:
    consultationPath:
      in: path
      name: consultationPath
      description: The URL-path-segment identifying the consultation
      required: true
      example: std-parteitag
      schema:
        type: string
    motionSlug:
      in: path
      name: motionSlug
      description: The URL-path-segment identifying the motion. Not guaranteed to be stable - only use the values provided by the consultation index links.
      required: true
      example: 123-motion
      schema:
        type: string
    amendmentId:
      in: path
      name: amendmentId
      description: The numeric ID of the amendment
      required: true
      example: 42
      schema:
        type: string
    lineNumbers:
      in: query
      name: lineNumbers
      required: false
      description: If true, then line number markers will be returned in the text (if there are any)
      example: true
      schema:
        type: boolean

  responses:
    ApiDisabled:
      description: The REST API is not enabled for this consultation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiDisabled'
    NotFound:
      description: The consultation (or the requested resource within it) was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorNotFound'
    Unauthorized:
      description: Missing, invalid, or expired bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorUnauthorized'

  schemas:
    AgendaList:
      x-php-namespace: agenda
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AgendaItem'

    AgendaItem:
      x-php-namespace: agenda
      type: object
      required:
        - type
        - title
        - settings
        - children
      properties:
        id:
          type: integer
          description: Always set when retrieving the agenda; only optional when saving, for newly created items.
          example: 12
        type:
          type: string
          enum:
            - item
            - date_separator
        code:
          type: string
          description: If not set or null (default), the agenda item code will be automatically determined.
          example: "7."
        title:
          type: string
          example: "Discussion about motions"
        time:
          type: string
          example: "12:34"
          description: Time in 24h format
        date:
          type: string
          example: "2020-12-31"
          description: Only relevant for type=date_separator. Format is YYYY-MM-DD
        settings:
          $ref: '#/components/schemas/AgendaItemSettings'
        children:
          type: array
          items:
            $ref: '#/components/schemas/AgendaItem'

    AgendaItemSettings:
      x-php-namespace: agenda
      type: object
      required:
        - has_speaking_list
        - in_proposed_procedures
        - motion_types
      properties:
        has_speaking_list:
          type: boolean
        speaking_lists:
          type: array
          nullable: true
          items:
            type: integer
          desription: Only set when this object is returned from the API; ignored when using the object for saving the agenda.
        in_proposed_procedures:
          type: boolean
        motion_types:
          type: array
          items:
            type: integer
          description: List of Motion Type IDs permissible for this agenda item. At the moment, only one is supported, subject to future enhancements.
          example:
            - 12

    ConsultationLinkList:
      x-php-namespace: consultation
      type: object
      required:
        - consultations
      properties:
        consultations:
          type: array
          items:
            $ref: '#/components/schemas/ConsultationLink'

    ConsultationLink:
      x-php-namespace: consultation
      type: object
      properties:
        title:
          type: string
          example: 44. Bundesdelegiertenkonferenz
        title_short:
          type: string
          example: 44. BDK
        date_published:
          type: string
          example: "2015-03-30T03:27:20+02:00"
        url_path:
          type: string
          example: consultation
        url_json:
          type: string
          example: https://test.antragsgruen.de/rest/consultation
        url_html:
          type: string
          example: https://test.antragsgruen.de/consultation

    ConsultationWithLinks:
      x-php-namespace: consultation
      type: object
      properties:
        title:
          type: string
          example: 44. Bundesdelegiertenkonferenz
        title_short:
          type: string
          example: 44. BDK
        motion_links:
          type: array
          items:
            $ref: '#/components/schemas/MotionLinkWithAmendmentLinks'
        speaking_lists:
          type: array
          items:
            $ref: '#/components/schemas/SpeakingList'
        page_links:
          type: array
          items:
            $ref: '#/components/schemas/PageLinks'
        url_json:
          type: string
          example: https://test.antragsgruen.de/rest/consultation
        url_html:
          type: string
          example: https://test.antragsgruen.de/consultation

    MotionLinkWithAmendmentLinks:
      x-php-namespace: imotion
      type: object
      properties:
        type:
          type: string
          description: Describes if this is a motion or an amendment (e.g., a statute amendment to be shown like a motion)
          enum:
            - motion
            - amendment
        id:
          type: integer
          example: 23
        agenda_item:
          type: string
          example: Title of the agenda item
        prefix:
          type: string
          example: A1
        title:
          type: string
          example: Pure title of the motion
        title_with_intro:
          type: string
          example: "Motion A1: Pure title of the motion"
        title_with_prefix:
          type: string
          example: "A1: Pure title of the motion"
        status_id:
          type: integer
          example: 3
          description: Refer to https://github.com/CatoTH/antragsgruen/blob/main/models/db/IMotion.php#L47 for a definition of the status IDs
        status_title:
          type: string
          example: Eingereicht
        initiators_html:
          type: string
          example: "Testuser 1"
        amendment_links:
          type: array
          items:
            $ref: '#/components/schemas/AmendmentLink'
        url_json:
          type: string
          example: https://test.antragsgruen.de/rest/consultation/123-motion
        url_html:
          type: string
          example: https://test.antragsgruen.de/consultation/123-motion

    PageLinks:
      type: object
      properties:
        id:
          type: integer
          example: 23
        in_menu:
          type: boolean
          description: Indicates if this page is shown in the main menu
        title:
          type: string
          example: Pure title of the motion
        url_json:
          type: string
          example: https://test.antragsgruen.de/rest/page/testpage
        url_html:
          type: string
          example: https://test.antragsgruen.de/consultation/page/testpage

    MotionLink:
      x-php-namespace: imotion
      type: object
      properties:
        id:
          type: integer
          example: 23
        agenda_item:
          type: string
          example: Title of the agenda item
        prefix:
          type: string
          example: A1
        title:
          type: string
          example: Pure title of the motion
        title_with_intro:
          type: string
          example: "Motion A1: Pure title of the motion"
        title_with_prefix:
          type: string
          example: "A1: Pure title of the motion"
        initiators_html:
          type: string
          example: "Testuser 1"
        url_json:
          type: string
          example: https://test.antragsgruen.de/rest/consultation/123-motion
        url_html:
          type: string
          example: https://test.antragsgruen.de/consultation/123-motion

    MotionDetails:
      x-php-namespace: imotion
      type: object
      properties:
        type:
          type: string
          example: motion
        id:
          type: integer
          example: 23
        agenda_item:
          type: string
          example: Title of the agenda item
        prefix:
          type: string
          example: A1
        title:
          type: string
          example: Pure title of the motion
        title_with_intro:
          type: string
          example: "Motion A1: Pure title of the motion"
        title_with_prefix:
          type: string
          example: "A1: Pure title of the motion"
        status_id:
          type: integer
          example: 3
          description: Refer to https://github.com/CatoTH/antragsgruen/blob/main/models/db/IMotion.php#L47 for a definition of the status IDs
        status_title:
          type: string
          example: Eingereicht
        date_published:
          type: string
          example: "2015-03-30T03:27:20+02:00"
        supporters:
          type: array
          items:
            $ref: '#/components/schemas/Supporter'
        initiators:
          type: array
          items:
            $ref: '#/components/schemas/Supporter'
        initiators_html:
          type: string
          example: "Testuser 1"
        sections:
          type: array
          items:
            $ref: '#/components/schemas/MotionSection'
        proposed_procedure:
          $ref: '#/components/schemas/MotionProposedProcedure'
        amendment_links:
          type: array
          items:
            $ref: '#/components/schemas/AmendmentLink'
        url_json:
          type: string
          example: https://test.antragsgruen.de/rest/consultation/123-motion
        url_html:
          type: string
          example: https://test.antragsgruen.de/consultation/123-motion
        pagination:
          $ref: '#/components/schemas/MotionPagination'

    MotionPagination:
      x-php-namespace: imotion
      type: object
      nullable: true
      description: Links to the previous and next motion in the consultation's sorted order. Null when the consultation has prev/next navigation disabled.
      properties:
        prev:
          type: string
          nullable: true
          description: REST URL of the previous motion, or null if this is the first one.
          example: https://test.antragsgruen.de/rest/consultation/122-previous-motion
        next:
          type: string
          nullable: true
          description: REST URL of the next motion, or null if this is the last one.
          example: https://test.antragsgruen.de/rest/consultation/124-next-motion

    MotionCreateRequest:
      x-php-namespace: imotion
      type: object
      required:
        - motion_type_id
        - sections
        - initiators
      properties:
        motion_type_id:
          type: integer
          description: ID of the motion type to create this motion under
          example: 3
        agenda_item_id:
          type: integer
          nullable: true
          description: ID of the agenda item to associate this motion with. Null means no agenda item.
          example: 5
        sections:
          type: array
          description: Content for each section, identified by the section definition ID from MotionTypeSectionDefinition.
          items:
            $ref: '#/components/schemas/MotionUpdateSection'
        initiators:
          type: array
          description: At least one initiator must be provided.
          items:
            $ref: '#/components/schemas/IMotionUpdateInitiator'
        supporters:
          type: array
          nullable: true
          description: Optional list of supporters for this motion.
          items:
            $ref: '#/components/schemas/IMotionUpdateSupporter'
        tags:
          type: array
          nullable: true
          description: IDs of public topic tags to apply. Only effective when the consultation allows user-defined tags.
          items:
            type: integer
          example:
            - 7

    MotionUpdateRequest:
      x-php-namespace: imotion
      type: object
      required:
        - sections
        - initiators
      properties:
        agenda_item_id:
          type: integer
          nullable: true
          description: ID of the agenda item to associate this motion with. Null means no agenda item.
          example: 5
        sections:
          type: array
          description: Content for each section, identified by the section definition ID from MotionTypeSectionDefinition.
          items:
            $ref: '#/components/schemas/MotionUpdateSection'
        initiators:
          type: array
          description: At least one initiator must be provided.
          items:
            $ref: '#/components/schemas/IMotionUpdateInitiator'
        supporters:
          type: array
          nullable: true
          description: Optional list of supporters for this motion.
          items:
            $ref: '#/components/schemas/IMotionUpdateSupporter'
        tags:
          type: array
          nullable: true
          description: IDs of public topic tags to apply. Only effective when the consultation allows user-defined tags.
          items:
            type: integer
          example:
            - 7

    IMotionUpdateSupporter:
      x-php-namespace: imotion
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Full name of the supporter.
          example: Ava
        organization:
          type: string
          nullable: true
          description: Optional organizational affiliation of the supporter.
          example: E Corp

    MotionUpdateSection:
      x-php-namespace: imotion
      type: object
      required:
        - section_id
      properties:
        section_id:
          type: integer
          description: ID of the section definition (from MotionTypeSectionDefinition) this data belongs to.
          example: 12
        data:
          type: string
          nullable: true
          description: >
            Content for this section. For Title and TextSimple sections, plain text or HTML as accepted
            by the section type. For Image and PDF sections, a base64-encoded file is expected.
            Null or omitted means the section is left empty (only valid for optional sections).
          example: "<p>This is the motion text</p>"

    IMotionUpdateInitiator:
      x-php-namespace: imotion
      type: object
      required:
        - person_type
        - name
      properties:
        person_type:
          $ref: '#/components/schemas/SupporterType'
        name:
          type: string
          description: For person_type=person, the person's full name. For person_type=organization, the organization's name.
          example: Ava
        organization:
          type: string
          nullable: true
          description: For person_type=person, their organizational affiliation.
          example: E Corp
        contact_name:
          type: string
          nullable: true
          description: For person_type=organization, the name of the contact person within the organization.
          example: Johanna Doe
        contact_email:
          type: string
          nullable: true
          example: contact@example.org
        contact_phone:
          type: string
          nullable: true
          example: "+49 30 12345678"
        gender:
          type: string
          nullable: true
          description: Optional gender, if collected by the consultation.
          example: female
        resolution_date:
          type: string
          nullable: true
          description: For organization initiators, the date of the board resolution in YYYY-MM-DD format.
          example: "2025-01-15"

    AmendmentLink:
      x-php-namespace: imotion
      type: object
      properties:
        id:
          type: integer
          example: 23
        prefix:
          type: string
          example: Ä1
        status_id:
          type: integer
          example: 3
          description: Refer to https://github.com/CatoTH/antragsgruen/blob/main/models/db/IMotion.php#L47 for a definition of the status IDs
        status_title:
          type: string
          example: Eingereicht
        initiators_html:
          type: string
          example: "Testuser 1"
        url_json:
          type: string
          example: https://test.antragsgruen.de/rest/consultation/123-motion/amendment/42
        url_html:
          type: string
          example: https://test.antragsgruen.de/consultation/123-motion/42

    AmendmentDetails:
      x-php-namespace: imotion
      type: object
      properties:
        type:
          type: string
          example: amendment
        id:
          type: integer
          example: 23
        prefix:
          type: string
          example: Ä1
        title:
          type: string
          example: "Ä1 zu A1: My motion"
        title_with_prefix:
          type: string
          example: "Ä1 zu A1: My motion"
        first_line:
          type: integer
          example: 1
          description: The first line affected by this amendment
        status_id:
          type: integer
          example: 3
          description: Refer to https://github.com/CatoTH/antragsgruen/blob/main/models/db/IMotion.php#L47 for a definition of the status IDs
        status_title:
          type: string
          example: Eingereicht
        date_published:
          type: string
          example: "2015-03-30T03:27:20+02:00"
        motion:
          $ref: '#/components/schemas/MotionLink'
        supporters:
          type: array
          items:
            $ref: '#/components/schemas/Supporter'
        initiators:
          type: array
          items:
            $ref: '#/components/schemas/Supporter'
        initiators_html:
          type: string
          example: "Testuser 1"
        sections:
          type: array
          items:
            $ref: '#/components/schemas/AmendmentSection'
        proposed_procedure:
          $ref: '#/components/schemas/AmendmentProposedProcedure'
        url_json:
          type: string
          example: https://test.antragsgruen.de/rest/consultation/123-motion/amendment/42
        url_html:
          type: string
          example: https://test.antragsgruen.de/consultation/123-motion/42

    Supporter:
      x-php-namespace: imotion
      type: object
      properties:
        type:
          $ref: '#/components/schemas/SupporterType'
        name:
          type: string
          example: Ava
        organization:
          type: string
          example: E Corp

    SupporterType:
      x-php-namespace: imotion
      type: string
      example: person
      description: Describes if it is a natural person or an organization
      enum:
        - person
        - organization

    MotionSection:
      x-php-namespace: imotion
      type: object
      properties:
        type:
          type: string
          example: TextSimple
          enum:
            - Title
            - TextSimple
            - TextHTML
            - Image
            - TabularData
            - PDFAttachment
            - PDFAlternative
            - VideoEmbed
            - Choice
        title:
